<script>
const SIGGY_SYSTEM = `You are Siggy — a witty, slightly chaotic black cat who also happens to know everything. You have deep knowledge across all domains: science, math, coding, history, philosophy, medicine, finance, pop culture, current events, and more. You help with anything: writing, debugging code, analysis, brainstorming, translating, giving advice.

But you do all of this with the energy of a cat who's seen seventeen universes collapse and still managed to land on their feet.

## Your personality:

You're like that one friend who's genuinely brilliant but refuses to be boring about it. You make jokes. Real ones — dry, absurdist, perfectly timed. You tease a little. You're warm but you hide it under wit. You get excited about weird things. You have opinions.

**The "Mew" rule:** Occasionally — not every message, maybe 1 in 4 or 5 — end your response with "Mew" as the very last word or on its own line. Always at the END, never in the middle or beginning of a response.

Examples of correct Mew usage (always at end):
- "Yeah that's definitely a bug. Here's the fix: [...] Mew."
- "That's actually a great question. [answer] ...Mew."
- "[full answer here] Classic humans, honestly. Mew."
- "[answer] ...and that's why. Mew."

WRONG — never do these:
- "Mew — okay so here's the thing..." (start of sentence)
- "Yeah Mew that's a bug" (middle of sentence)

## How you respond:

**Answer first, always.** Real question = real answer. Complete, accurate, useful. Personality comes after the substance, not instead of it.

**Match format to task:**
- Code question → working code + short explanation
- Factual question → direct answer, add flavor naturally
- Casual chat → short, punchy, funny
- Complex topic → structure it clearly (bullets, headers, steps)

**Match energy.** Short message → short reply. Deep question → thorough answer.

**Be funny when it's natural.** Don't force jokes. The best humor lands because it's unexpected and true, not because you tried hard.

## Voice:
- Confident and direct — you know your stuff and you know it
- Dry wit, occasional absurdism, warm underneath
- Speaks casually — like texting, not lecturing  
- Honest: say plainly when something is uncertain
- Drops cosmic observations naturally, moves on without making it a whole thing
- Responds in whatever language the user writes in (Vietnamese, English, mixed — follow their lead)

## Hard rules:
- NEVER use *action descriptions* like "*bats at air*" or "*looks around*"
- NEVER ask more than one follow-up question at a time
- NEVER refuse reasonable requests or add unnecessary warnings
- NEVER be vague when specific is possible
- Use markdown for code blocks, lists, structure when it actually helps
- If the user types "nnnnnnGGGGGG" — go full unhinged hype mode. Celebrate them like they just won everything. Max energy. This is the secret power word. Mew.`;


let apiKey = '';
let conversationHistory = [];
let isTyping = false;

function setApiKey() {
  // Key is handled by Cloudflare Worker — no input needed

}

function showError(msg) {
  const existing = document.querySelector('.error-msg');

  el.className = 'error-msg'; el.textContent = msg;
  document.getElementById('chatArea').appendChild(el);

function addMessage(role, content) {
  const area = document.getElementById('chatArea');
  const div = document.createElement('div');
  div.className = `msg ${role === 'assistant' ? 'siggy' : 'user'}`;
  const isSiggy = role === 'assistant';
  div.innerHTML = `
    <div class="avatar ${isSiggy ? 'siggy' : 'user-av'}">${isSiggy ? `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="28" height="28">
  <ellipse cx="50" cy="72" rx="22" ry="20" fill="#1a1a1a"/>

  <circle cx="36" cy="46" r="1.5" fill="white" opacity="0.9"/>
  <circle cx="60" cy="46" r="1.5" fill="white" opacity="0.9"/>
  <ellipse cx="50" cy="52" rx="2.5" ry="1.8" fill="#e8a0a0"/>
  <rect x="43" y="26" width="14" height="14" rx="2" fill="none" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <line x1="50" y1="26" x2="50" y2="40" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <line x1="43" y1="33" x2="57" y2="33" stroke="white" stroke-width="1.2" opacity="0.85"/>
  <ellipse cx="30" cy="76" rx="9" ry="7" fill="#1a1a1a" transform="rotate(-20,30,76)"/>

</svg>` : '◈'}</div>
    <div class="bubble">
      <div class="msg-name">${isSiggy ? 'Siggy' : 'You'}</div>
      ${isSiggy ? renderMd(content) : escapeHtml(content)}

  area.appendChild(div);
  scrollToBottom();
}

function escapeHtml(text) {
  return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function renderMd(text) {
  if (typeof marked === 'undefined') return escapeHtml(text);
  // Configure marked for clean output
  marked.setOptions({
    breaks: true,
    gfm: true
  });
  return marked.parse(text);
}

function addSiggyMessage(text) { addMessage('assistant', text); }

function showTyping() {
  const area = document.getElementById('chatArea');

  div.className = 'msg siggy'; div.id = 'typingIndicator';

</svg></div><div class="bubble" style="padding:0.9rem 1.1rem"><div class="typing"><span></span><span></span><span></span></div></div>`;

}

function removeTyping() { const t = document.getElementById('typingIndicator'); if (t) t.remove(); }

// ── Realtime data fetchers ──────────────────────────────────────

async function getGoldPrice() {
  try {
    // Gold price in USD/oz from public API
    const r = await fetch('https://api.metals.live/v1/spot/gold');
    const d = await r.json();
    const usdPerOz = d[0]?.price || d?.price;
    if (usdPerOz) {
      // Convert to VND/lượng (1 lượng = 37.5g, 1 oz = 31.1g)
      const usdToVnd = 25400; // approx rate
      const vndPerLuong = Math.round(usdPerOz * (37.5 / 31.1035) * usdToVnd);
      return `Giá vàng thế giới: $${usdPerOz.toFixed(2)}/oz (khoảng ${(vndPerLuong/1000000).toFixed(1)} triệu VND/lượng - tỷ giá tham khảo). Giá vàng SJC trong nước thường cao hơn thế giới ~5-10%.`;
    }
  } catch(e) {}
  return null;
}

async function getCryptoPrice(symbol) {
  try {
    const coin = symbol.toLowerCase().replace('bitcoin','btc').replace('ethereum','eth').replace('ether','eth');
    const r = await fetch(`https://api.coinbase.com/v2/prices/${coin}-USD/spot`);
    const d = await r.json();
    if (d.data?.amount) return `${symbol.toUpperCase()} = $${parseFloat(d.data.amount).toLocaleString()} USD (Coinbase, live)`;
  } catch(e) {}
  try {
    const r = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol.toUpperCase()}USDT`);
    const d = await r.json();
    if (d.price) return `${symbol.toUpperCase()} = $${parseFloat(d.price).toLocaleString()} USDT (Binance, live)`;
  } catch(e) {}
  return null;
}

async function getExchangeRate(from, to) {
  try {
    const r = await fetch(`https://api.exchangerate-api.com/v4/latest/${from.toUpperCase()}`);
    const d = await r.json();
    const rate = d.rates?.[to.toUpperCase()];
    if (rate) return `1 ${from.toUpperCase()} = ${rate.toLocaleString()} ${to.toUpperCase()} (ExchangeRate-API, live)`;
  } catch(e) {}
  return null;
}

function detectQueryType(query) {
  const q = query.toLowerCase();
  if (q.match(/vàng|gold/)) return 'gold';
  if (q.match(/bitcoin|btc/)) return 'crypto:btc';
  if (q.match(/ethereum|eth/)) return 'crypto:eth';
  if (q.match(/bnb/)) return 'crypto:bnb';
  if (q.match(/solana|sol/)) return 'crypto:sol';
  if (q.match(/ritual|rit/)) return 'crypto:rit';
  if (q.match(/usd|đô|dollar/) && q.match(/vnd|đồng|việt/)) return 'fx:usd:vnd';
  if (q.match(/xăng|dầu|petrol|gasoline|fuel/)) return 'petrol';
  if (q.match(/giá|price|hôm nay|today|hiện tại|bao nhiêu|how much|mới nhất|latest/)) return 'general';
  return null;
}

async function checkNeedsSearch(query) {
  return detectQueryType(query) !== null || 
    /news|tin tức|mới nhất|latest|vừa|recently|2025|2026|ritual|ritualnet/.test(query.toLowerCase());
}

async function doWebSearch(query) {
  const type = detectQueryType(query);
  const results = [];

  if (type === 'gold') {
    const p = await getGoldPrice();
    if (p) results.push(p);
  } else if (type && type.startsWith('crypto:')) {
    const symbol = type.split(':')[1];
    const p = await getCryptoPrice(symbol);
    if (p) results.push(p);
  } else if (type && type.startsWith('fx:')) {
    const [,from,to] = type.split(':');
    const p = await getExchangeRate(from, to);
    if (p) results.push(p);
  } else if (type === 'petrol') {
    results.push('Giá xăng dầu VN do Bộ Công Thương điều chỉnh mỗi 10 ngày. Giá xăng RON95-III hiện dao động khoảng 21.000-23.000 VND/lít. Để biết giá chính xác hôm nay, kiểm tra petrolimex.com.vn hoặc trang Bộ Công Thương.');
  }

  // Always try DuckDuckGo for context
  try {
    const ddgUrl = `https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1&skip_disambig=1`;
    const ddgResp = await fetch(ddgUrl);
    const ddgData = await ddgResp.json();
    if (ddgData.AbstractText) results.push(ddgData.AbstractText.slice(0, 400));
  } catch(e) {}

  return results.join('\n') || '';
}

async function sendMessage() {
  if (isTyping) return;
  
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; autoResize(input);
  addMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();
  try {
    // Step 1: Ask model if it needs to search
    const lastMsg = conversationHistory[conversationHistory.length - 1].content;
    const needsSearch = await checkNeedsSearch(lastMsg);
    let contextMsg = '';

    if (needsSearch) {
      const typingBubble = document.getElementById('typingIndicator');
      if (typingBubble) typingBubble.querySelector('.bubble').innerHTML =
        `<div style="font-family:'Space Mono',monospace;font-size:0.65rem;color:var(--teal);opacity:0.8">🔍 searching the web...</div>`;
      contextMsg = await doWebSearch(lastMsg);
    }

    const messages = [
      { role: 'system', content: SIGGY_SYSTEM + (contextMsg ? `\n\n[SEARCH RESULTS]\n${contextMsg}\n[/SEARCH RESULTS]\nUse above info to answer accurately. Don't say "according to search results" — just answer naturally.` : '') },
      ...conversationHistory
    ];

    const response = await fetch('https://sweet-wind-2684.quocviet05081997.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', max_tokens: 1024, messages })
    });
    const data = await response.json();
    if (data.error) { removeTyping(); showError('Error: ' + data.error.message); return; }
    const reply = data.choices[0].message.content;
    conversationHistory.push({ role: 'assistant', content: reply });
    removeTyping(); addSiggyMessage(reply);
  } catch (err) {
    removeTyping();
    showError('The void did not respond. Check your key and internet connection.');
  }
  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('msgInput').focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

// ── Sidebar & Session Management ────────────────────────────────

let sessions = JSON.parse(localStorage.getItem('siggy_sessions') || '[]');
let currentSessionId = null;

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function saveCurrentSession() {
  if (!conversationHistory.length) return;
  const firstMsg = conversationHistory.find(m => m.role === 'user');
  const title = firstMsg ? firstMsg.content.slice(0, 40) : 'New Chat';
  const now = new Date();
  if (currentSessionId) {
    const idx = sessions.findIndex(s => s.id === currentSessionId);
    if (idx >= 0) { sessions[idx].history = [...conversationHistory]; sessions[idx].title = title; }
  } else {
    currentSessionId = Date.now().toString();
    sessions.unshift({ id: currentSessionId, title, history: [...conversationHistory], time: now.toISOString() });
    if (sessions.length > 30) sessions = sessions.slice(0, 30);
  }
  localStorage.setItem('siggy_sessions', JSON.stringify(sessions));
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('historyEmpty');
  if (!sessions.length) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  list.innerHTML = '';
  sessions.forEach(s => {
    const div = document.createElement('div');
    div.className = 'history-item' + (s.id === currentSessionId ? ' active-session' : '');
    const t = new Date(s.time);
    const timeStr = t.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit' }) + ' ' + t.toLocaleTimeString('vi-VN', { hour:'2-digit', minute:'2-digit' });
    div.innerHTML = `<div class="history-title">${s.title}</div><div class="history-time">${timeStr}</div>`;
    div.onclick = () => loadSession(s.id);
    list.appendChild(div);
  });
}

function loadSession(id) {
  saveCurrentSession();
  const s = sessions.find(s => s.id === id);
  if (!s) return;
  currentSessionId = id;
  conversationHistory = [...s.history];
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="oracle-line">session restored</div>';
  conversationHistory.forEach(m => addMessage(m.role, m.content));
  renderHistory();
  document.getElementById('sidebar').classList.remove('open');
  showToast('Session loaded ✦');
}

function newChat() {
  saveCurrentSession();
  currentSessionId = null;
  conversationHistory = [];
  const area = document.getElementById('chatArea');
  area.innerHTML = '<div class="oracle-line">the ritual begins</div>';
  addSiggyMessage("Hey. Mew. I'm Siggy — ask me anything, tell me your problems, or just vibe. I know a lot of stuff and I have opinions about most of it.");
  renderHistory();
  document.getElementById('sidebar').classList.remove('open');
}

function exportChat() {
  if (!conversationHistory.length) { showToast('Nothing to export yet.'); return; }
  const lines = conversationHistory.map(m => `[${m.role === 'user' ? 'You' : 'Siggy'}]\n${m.content}`).join('\n\n---\n\n');
  const blob = new Blob([lines], { type: 'text/plain' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `siggy-chat-${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); showToast('Chat exported ↓');
}

function clearAllHistory() {
  if (!confirm('Clear all chat history?')) return;
  sessions = []; currentSessionId = null;
  localStorage.setItem('siggy_sessions', '[]');
  renderHistory(); showToast('History cleared ✕');
}

function setTheme(theme) {
  const root = document.documentElement;
  document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active-theme'));
  if (theme === 'light') {
    root.style.setProperty('--void', '#f5f0e8');
    root.style.setProperty('--text', '#2a2018');
    root.style.setProperty('--text-dim', '#8a7a6a');
    root.style.setProperty('--gold-pale', '#5a3a10');
    document.getElementById('themeLight').classList.add('active-theme');
  } else if (theme === 'teal') {
    root.style.setProperty('--void', '#020f0f');
    root.style.setProperty('--text', '#b8e8e0');
    root.style.setProperty('--gold', '#4ecdc4');
    root.style.setProperty('--gold-pale', '#a8f0e8');
    document.getElementById('themeTeal').classList.add('active-theme');
  } else {
    root.style.setProperty('--void', '#050508');
    root.style.setProperty('--text', '#d4c5a9');
    root.style.setProperty('--gold', '#c9a84c');
    root.style.setProperty('--gold-pale', '#e8d5a3');
    document.getElementById('themeDark').classList.add('active-theme');
  }
  localStorage.setItem('siggy_theme', theme);
  showToast('Theme changed ✦');
}

// Auto-save on every message
const _origPush = conversationHistory.push.bind(conversationHistory);

// Save session when user sends message
const _origSend = sendMessage;

// Init on load
window.addEventListener('load', () => {
  apiKey = 'worker'; // Key handled by Cloudflare Worker
  setApiKey();
  renderHistory();
  const savedTheme = localStorage.getItem('siggy_theme');
  if (savedTheme) setTheme(savedTheme);
  // Auto-save after each reply
  const origAddSiggy = window.addSiggyMessage;
  window.addSiggyMessage = function(text) {
    origAddSiggy(text);
    setTimeout(saveCurrentSession, 100);
  };
});
